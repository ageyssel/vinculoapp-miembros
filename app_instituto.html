<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1D4ED8">
    <title>Instituto Bíblico - VínculoApp</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { background-color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; }
        .app-container { max-width: 800px; margin: 0 auto; background: #ffffff; min-height: 100vh; box-shadow: 0 10px 40px rgba(0, 43, 91, 0.08); position: relative; padding-bottom: 80px;}
        .header-app { background: linear-gradient(135deg, #1D4ED8, #002B5B); color: white; padding: 20px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;}
        .card-curso { cursor: pointer; transition: transform 0.2s; border: 2px solid transparent; }
        .card-curso:hover { transform: translateY(-3px); border-color: #1D4ED8; }
        .nav-tabs .nav-link { color: #64748b; font-weight: 600; border: none; border-bottom: 3px solid transparent; padding: 12px 15px; }
        .nav-tabs .nav-link.active { color: #1D4ED8; border-bottom-color: #1D4ED8; background: transparent; }
    </style>
</head>
<body>

<div class="app-container" id="main-app">
    
    <script>
        const SUPABASE_URL = 'https://molqmoxdnddsrljuoljv.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vbHFtb3hkbmRkc3JsanVvbGp2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDQ5NzIzMSwiZXhwIjoyMDkwMDczMjMxfQ.1Is7Jz6dM7BXSXSeZppXf0_uq4bbKiNsCwlKzuL5YNw';
        const clienteSupa = window.supabase.createClient(supaURL, supaKEY);
    </script>

    <div class="header-app d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center" onclick="window.location.href='app_inicio.html'" style="cursor:pointer;">
            <i class="fa-solid fa-arrow-left fs-4 me-3"></i>
            <div>
                <h5 class="fw-bold m-0 text-white">Mi Instituto</h5>
                <small class="opacity-75" id="header-nombre">Cargando perfil...</small>
            </div>
        </div>
        <i class="fa-solid fa-graduation-cap fs-2 opacity-50"></i>
    </div>

    <div class="p-4" id="contenedor-vistas">
        <div id="vista-cursos" class="animate__animated animate__fadeIn">
            <h6 class="fw-bold text-muted mb-3">MIS CURSOS ACTIVOS</h6>
            <div id="lista-cursos">
                <div class="text-center py-5"><i class="fa-solid fa-spinner fa-spin fa-2x text-primary mb-3"></i><p>Buscando tus inscripciones...</p></div>
            </div>
        </div>

        <div id="vista-aula" class="animate__animated animate__fadeInRight" style="display: none;">
            <button class="btn btn-sm btn-light border shadow-sm rounded-pill mb-3 fw-bold" onclick="volverACursos()"><i class="fa-solid fa-arrow-left me-2"></i>Volver a mis cursos</button>
            <h4 class="fw-bold text-dark mb-1" id="aula-titulo">Nombre del Curso</h4>
            <p class="text-muted small mb-3" id="aula-profe">Profesor</p>

            <ul class="nav nav-tabs mb-4 border-bottom-0 shadow-sm rounded-4 bg-light overflow-hidden" role="tablist">
                <li class="nav-item flex-fill text-center"><a class="nav-link active" data-bs-toggle="tab" href="#tab-muro"><i class="fa-solid fa-chalkboard me-1"></i>Muro</a></li>
                <li class="nav-item flex-fill text-center"><a class="nav-link" data-bs-toggle="tab" href="#tab-tareas"><i class="fa-solid fa-book me-1"></i>Trabajos</a></li>
                <li class="nav-item flex-fill text-center"><a class="nav-link" data-bs-toggle="tab" href="#tab-notas"><i class="fa-solid fa-star me-1"></i>Notas</a></li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="tab-muro"></div>
                <div class="tab-pane fade" id="tab-tareas"></div>
                <div class="tab-pane fade" id="tab-notas"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let miPerfil = null;
    let cursoActivoId = null;

    window.onload = async () => {
        // 1. Validar Sesión y Obtener ID del Alumno
        const { data: authData } = await clienteSupa.auth.getUser();
        if (!authData.user) return window.location.href = 'index.html';

        const { data: perfil } = await clienteSupa.from('personas').select('*').eq('email', authData.user.email).maybeSingle();
        if (!perfil) return Swal.fire('Error', 'No tienes un perfil vinculado. Contacta a soporte.', 'error');
        
        miPerfil = perfil;
        document.getElementById('header-nombre').innerText = perfil.nombre;

        cargarMisCursos();
    };

    // ==========================================================
    // 2. CARGAR CURSOS DEL ESTUDIANTE
    // ==========================================================
    async function cargarMisCursos() {
        const { data: inscripciones, error } = await clienteSupa.from('va_inscripciones').select('curso_id').eq('miembro_id', miPerfil.id);
        
        if (error || !inscripciones || inscripciones.length === 0) {
            document.getElementById('lista-cursos').innerHTML = `<div class="card border-0 shadow-sm rounded-4 p-5 text-center bg-light mt-3"><i class="fa-solid fa-folder-open fs-1 mb-3 text-muted opacity-50"></i><h6 class="fw-bold">No estás inscrito en ningún curso</h6><p class="small text-muted mb-0">Comunícate con tu maestro para que te asigne a una clase.</p></div>`;
            return;
        }

        let cursosIds = inscripciones.map(i => i.curso_id);
        const { data: cursos } = await clienteSupa.from('va_cursos').select('*').in('id', cursosIds);

        let html = cursos.map(c => `
            <div class="card card-curso border-0 shadow-sm rounded-4 mb-3" onclick="entrarAlCurso('${c.id}', '${c.nombre}', '${c.profesor_nombre || 'Sin asignar'}')">
                <div class="card-body p-4 d-flex align-items-center">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-4 d-flex justify-content-center align-items-center me-3" style="width: 50px; height: 50px;"><i class="fa-solid fa-chalkboard-user fs-4"></i></div>
                    <div class="flex-grow-1">
                        <h6 class="fw-bold mb-1 text-dark">${c.nombre}</h6>
                        <small class="text-muted"><i class="fa-solid fa-user-tie me-1"></i>${c.profesor_nombre || 'Profesor sin asignar'}</small>
                    </div>
                    <i class="fa-solid fa-chevron-right text-muted opacity-50"></i>
                </div>
            </div>
        `).join('');

        document.getElementById('lista-cursos').innerHTML = html;
    }

    // ==========================================================
    // 3. ABRIR EL AULA VIRTUAL
    // ==========================================================
    function entrarAlCurso(id, nombre, profe) {
        cursoActivoId = id;
        document.getElementById('vista-cursos').style.display = 'none';
        document.getElementById('vista-aula').style.display = 'block';
        document.getElementById('aula-titulo').innerText = nombre;
        document.getElementById('aula-profe').innerText = profe;
        
        cargarMuro();
        cargarTareas();
        cargarMisNotas();
    }

    function volverACursos() {
        document.getElementById('vista-aula').style.display = 'none';
        document.getElementById('vista-cursos').style.display = 'block';
        cursoActivoId = null;
    }

    // ==========================================================
    // 4. CARGAR TRABAJOS Y EXÁMENES (VISTA ESTUDIANTE)
    // ==========================================================
    async function cargarTareas() {
        document.getElementById('tab-tareas').innerHTML = '<div class="text-center py-4"><i class="fa-solid fa-spinner fa-spin text-primary"></i></div>';
        const { data: tareas } = await clienteSupa.from('va_edu_tareas').select('*').eq('curso_id', cursoActivoId).order('created_at', { ascending: false });

        if (!tareas || tareas.length === 0) {
            return document.getElementById('tab-tareas').innerHTML = `<div class="text-center p-5 opacity-50"><i class="fa-solid fa-layer-group fa-2x mb-2 text-primary"></i><p>No hay trabajos publicados aún.</p></div>`;
        }

        let html = '';
        tareas.forEach(t => {
            let esExamen = (t.es_examen === true || t.tipo === 'examen');
            let icon = esExamen ? 'fa-vial-circle-check' : (t.tipo === 'tarea' ? 'fa-file-signature' : 'fa-book-bookmark');
            let color = esExamen ? 'bg-danger' : (t.tipo === 'tarea' ? 'bg-primary' : 'bg-success');

            let btnAccion = '';
            if (esExamen) btnAccion = `<button class="btn btn-danger btn-sm rounded-pill px-4 fw-bold shadow-sm w-100 mt-2" onclick="comenzarExamen('${t.id}')"><i class="fa-solid fa-play me-2"></i>Rendir Examen</button>`;
            else if (t.archivo_url) btnAccion = `<a href="${t.archivo_url}" target="_blank" class="btn btn-outline-primary btn-sm rounded-pill px-4 fw-bold shadow-sm w-100 mt-2"><i class="fa-solid fa-file-pdf me-2"></i>Abrir Material</a>`;
            else if (t.link_adjunto) btnAccion = `<a href="${t.link_adjunto}" target="_blank" class="btn btn-outline-info btn-sm rounded-pill px-4 fw-bold shadow-sm w-100 mt-2"><i class="fa-solid fa-link me-2"></i>Ver Enlace</a>`;

            let fecha = t.fecha_entrega ? `<small class="text-danger fw-bold d-block mt-2"><i class="fa-regular fa-clock me-1"></i>Vence: ${new Date(t.fecha_entrega).toLocaleString()}</small>` : '';

            html += `
            <div class="card border-0 shadow-sm rounded-4 mb-3">
                <div class="card-body p-3">
                    <div class="d-flex align-items-center mb-2">
                        <div class="${color} text-white rounded-circle d-flex justify-content-center align-items-center me-3 shadow-sm" style="width: 40px; height: 40px;"><i class="fa-solid ${icon}"></i></div>
                        <div><h6 class="fw-bold m-0">${t.titulo}</h6><span class="badge bg-light text-secondary border mt-1">${(esExamen?'Examen':t.tipo).toUpperCase()}</span></div>
                    </div>
                    <p class="small text-muted mb-0" style="white-space: pre-wrap;">${t.descripcion || ''}</p>
                    ${fecha} ${btnAccion}
                </div>
            </div>`;
        });
        document.getElementById('tab-tareas').innerHTML = html;
    }

    // ==========================================================
    // 5. MOTOR DE RESOLUCIÓN DE EXÁMENES (EL MISMO DE ADMIN)
    // ==========================================================
    async function comenzarExamen(tareaId) {
        Swal.fire({title: 'Cargando examen...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
        try {
            const { data: tarea } = await clienteSupa.from('va_edu_tareas').select('*').eq('id', tareaId).single();
            const { data: yaRindio } = await clienteSupa.from('va_edu_examenes_resultados').select('*').eq('tarea_id', tareaId).eq('alumno_id', String(miPerfil.id)).maybeSingle();

            if (yaRindio) return Swal.fire({ title: 'Examen Completado', text: `Ya rendiste este examen. Tu calificación fue: ${yaRindio.puntaje_obtenido}%`, icon: 'info' });

            let preguntas = tarea.examen_preguntas;
            if (!preguntas || preguntas.length === 0) return Swal.fire("Aviso", "Este examen no tiene preguntas configuradas.", "info");

            let htmlExamen = `<div class="text-start" style="max-height: 60vh; overflow-y: auto; padding: 5px;"><div class="alert alert-danger bg-danger bg-opacity-10 text-danger small mb-4 fw-bold"><i class="fa-solid fa-circle-exclamation me-2"></i>Responde atentamente. No podrás modificar tus respuestas.</div>`;
            
            preguntas.forEach((p, i) => {
                htmlExamen += `<div class="mb-4 p-3 border rounded-4 shadow-sm bg-white"><h6 class="fw-bold mb-3">${i + 1}. ${p.pregunta}</h6>`;
                if (p.tipo === 'texto') htmlExamen += `<input type="text" class="form-control resp-examen bg-light" data-idx="${i}">`;
                else if (p.tipo === 'parrafo') htmlExamen += `<textarea class="form-control resp-examen bg-light" rows="3" data-idx="${i}"></textarea>`;
                else if (p.tipo === 'multiple') {
                    let ops = [...p.opciones].sort(() => Math.random() - 0.5);
                    ops.forEach((op, opIdx) => { htmlExamen += `<div class="form-check mb-2"><input class="form-check-input resp-examen" type="radio" name="p_${i}" id="p_${i}_${opIdx}" value="${op}" data-idx="${i}"><label class="form-check-label w-100" for="p_${i}_${opIdx}">${op}</label></div>`; });
                } else if (p.tipo === 'casillas') {
                    let ops = [...p.opciones].sort(() => Math.random() - 0.5);
                    ops.forEach((op, opIdx) => { htmlExamen += `<div class="form-check mb-2"><input class="form-check-input resp-examen-check" type="checkbox" name="p_${i}" id="p_${i}_${opIdx}" value="${op}" data-idx="${i}"><label class="form-check-label w-100" for="p_${i}_${opIdx}">${op}</label></div>`; });
                } else if (p.tipo === 'desplegable') {
                    let ops = [...p.opciones].sort(() => Math.random() - 0.5);
                    htmlExamen += `<select class="form-select resp-examen bg-light" data-idx="${i}"><option value="">Selecciona...</option>`;
                    ops.forEach(op => { htmlExamen += `<option value="${op}">${op}</option>`; });
                    htmlExamen += `</select>`;
                }
                htmlExamen += `</div>`;
            });
            htmlExamen += `</div>`;

            const { value: respValidas } = await Swal.fire({
                title: `<h5 class="fw-bold text-danger m-0">${tarea.titulo}</h5>`, html: htmlExamen, showCancelButton: true, confirmButtonText: 'Entregar Examen', confirmButtonColor: '#dc3545', allowOutsideClick: false,
                preConfirm: () => {
                    let respuestas = []; let faltan = false;
                    preguntas.forEach((p, i) => {
                        let val = null;
                        if (p.tipo === 'casillas') { val = Array.from(document.querySelectorAll(`input[name="p_${i}"]:checked`)).map(c => c.value); if(!val.length) faltan = true; } 
                        else if (p.tipo === 'multiple') { let r = document.querySelector(`input[name="p_${i}"]:checked`); if(r) val = r.value; else faltan = true; } 
                        else { let inp = document.querySelector(`.resp-examen[data-idx="${i}"]`); val = inp ? inp.value.trim() : ""; if(!val) faltan = true; }
                        respuestas.push(val);
                    });
                    if (faltan) { Swal.showValidationMessage("⚠️ Responde todas las preguntas."); return false; }
                    return respuestas;
                }
            });

            if (respValidas) {
                Swal.fire({title: 'Calificando...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                let correctas = 0; let totalCerradas = 0;
                preguntas.forEach((p, i) => {
                    if (['multiple', 'desplegable'].includes(p.tipo)) { totalCerradas++; if (respValidas[i] === p.opciones[0]) correctas++; } 
                    else if (p.tipo === 'casillas') { totalCerradas++; if (respValidas[i].includes(p.opciones[0])) correctas++; }
                });

                let puntaje = totalCerradas > 0 ? Math.round((correctas / totalCerradas) * 100) : 100;
                await clienteSupa.from('va_edu_examenes_resultados').insert([{ tarea_id: tareaId, alumno_id: String(miPerfil.id), respuestas: respValidas, puntaje_obtenido: puntaje }]);
                Swal.fire('¡Examen Entregado!', `Tu calificación automática es: <b>${puntaje}%</b>`, 'success');
                cargarMisNotas();
            }
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
    }

    // ==========================================================
    // 6. CARGAR MURO Y NOTAS (FUNCIONES SIMPLIFICADAS)
    // ==========================================================
    async function cargarMuro() {
        const { data: posts } = await clienteSupa.from('va_edu_muro').select('*').eq('curso_id', cursoActivoId).order('created_at', { ascending: false });
        let html = (posts && posts.length > 0) ? posts.map(p => `<div class="card border-0 shadow-sm rounded-4 mb-3"><div class="card-body p-3"><div class="d-flex align-items-center mb-2"><div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center me-2" style="width:35px; height:35px;"><i class="fa-solid fa-user"></i></div><div><h6 class="fw-bold m-0 small">${p.autor_nombre}</h6><small class="text-muted" style="font-size:0.7rem;">${new Date(p.created_at).toLocaleString()}</small></div></div><p class="mb-0 small" style="white-space: pre-wrap;">${p.contenido}</p></div></div>`).join('') : '<div class="text-center p-4 text-muted small">No hay anuncios en el muro.</div>';
        document.getElementById('tab-muro').innerHTML = html;
    }

    async function cargarMisNotas() {
        document.getElementById('tab-notas').innerHTML = '<div class="text-center py-4"><i class="fa-solid fa-spinner fa-spin text-warning"></i></div>';
        const { data: tareas } = await clienteSupa.from('va_edu_tareas').select('id, titulo').eq('curso_id', cursoActivoId).eq('es_examen', true);
        const { data: notas } = await clienteSupa.from('va_edu_examenes_resultados').select('*').eq('alumno_id', String(miPerfil.id));

        if (!tareas || tareas.length === 0) return document.getElementById('tab-notas').innerHTML = '<div class="text-center p-4 text-muted small">No hay exámenes en este curso.</div>';

        let html = '<ul class="list-group list-group-flush rounded-4 shadow-sm">';
        let sum = 0; let count = 0;
        tareas.forEach(t => {
            let res = notas.find(n => n.tarea_id === t.id);
            if(res) { sum += parseFloat(res.puntaje_obtenido); count++; }
            let color = res ? (res.puntaje_obtenido >= 60 ? 'text-success' : 'text-danger') : 'text-muted';
            html += `<li class="list-group-item d-flex justify-content-between align-items-center p-3 border-0 mb-1"><span class="small fw-bold">${t.titulo}</span> <span class="fw-bold ${color}">${res ? res.puntaje_obtenido + '%' : 'Pendiente'}</span></li>`;
        });
        
        let prom = count > 0 ? Math.round(sum/count) : 0;
        html += `</ul><div class="alert alert-warning text-center mt-3 fw-bold rounded-4 shadow-sm border-0">PROMEDIO FINAL: ${prom > 0 ? prom + '%' : '-'}</div>`;
        document.getElementById('tab-notas').innerHTML = html;
    }
</script>
</body>
</html>
