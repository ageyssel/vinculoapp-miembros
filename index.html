<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#002B5B"> 
    <title>Mi Iglesia - VínculoApp</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --brand-primary: #002B5B; 
            --brand-accent: #1D4ED8;  
            --brand-success: #10b981; 
        }

        body { 
            background-color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        
        .mobile-container {
            max-width: 480px; 
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 50px rgba(0, 43, 91, 0.1);
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            border-radius: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 43, 91, 0.08);
            border: 1px solid rgba(0, 43, 91, 0.05);
            margin-bottom: 20px;
        }

        .form-control-custom, .form-select-custom {
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .form-control-custom:focus, .form-select-custom:focus {
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.15);
            border-color: var(--brand-accent);
        }

        .btn-brand {
            background: var(--brand-primary);
            color: white;
            border-radius: 14px;
            padding: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0, 43, 91, 0.2);
        }
        
        .btn-brand:active { transform: scale(0.97); }
        .btn-brand:hover { background: #001f42; color: white; }

        .btn-accent {
            background: var(--brand-accent);
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.25);
        }
        .btn-accent:hover { background: #1e40af; }
        
        .vinculo-loader { display: none; }
        .vinculo-loader.active { display: inline-block; }
    </style>
</head>
<body>

    <div class="mobile-container animate__animated animate__fadeIn">
        
        <div class="text-center pt-5 pb-2 px-4">
            <div class="logo-container">
                <img src="logo.png" alt="VínculoApp" width="55" style="object-fit: contain;" onerror="this.style.display='none'">
            </div>
            <h3 class="fw-bold text-dark mb-1" style="color: var(--brand-primary) !important;">Bienvenido</h3>
            <p class="text-muted small">Tu iglesia en la palma de tu mano</p>
        </div>

        <div class="flex-grow-1 px-4 pt-3">
            
            <div id="vista-login">
                <div id="login-error" class="alert alert-danger d-none small py-2 rounded-3 border-0 bg-danger bg-opacity-10 text-danger fw-medium"></div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted ms-1 mb-1">Correo Electrónico</label>
                    <input type="email" id="login-email" class="form-control form-control-custom" placeholder="tu@correo.com">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted ms-1 mb-1">Contraseña</label>
                    <input type="password" id="login-pass" class="form-control form-control-custom" placeholder="••••••••">
                </div>
                
                <button id="btn-login" class="btn btn-brand w-100 mb-4" onclick="ejecutarLogin()">
                    <span class="btn-text">Iniciar Sesión</span>
                    <i class="fa-solid fa-circle-notch fa-spin vinculo-loader ms-2"></i>
                </button>
                
                <div class="text-center mt-2 border-top pt-4">
                    <span class="text-muted small">¿Aún no tienes tu cuenta o eres nuevo?</span><br>
                    <button class="btn btn-link text-primary fw-bold text-decoration-none p-0 mt-1" onclick="alternarVistas()" style="color: var(--brand-accent) !important;">Crear mi perfil ahora</button>
                </div>
            </div>

            <div id="vista-registro" class="d-none animate__animated animate__fadeInRight">
                
                <div class="alert border-0 rounded-4 p-3 mb-4 d-flex align-items-start" style="background-color: #f0fdf4; color: #166534;">
                    <i class="fa-solid fa-shield-check mt-1 me-2 text-success"></i>
                    <small style="line-height: 1.3;">Busca tu nombre para <b>vincular tu perfil automáticamente</b> a los registros de tu iglesia.</small>
                </div>

                <div id="reg-error" class="alert alert-danger d-none small py-2 rounded-3 border-0 bg-danger bg-opacity-10 text-danger fw-medium"></div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted ms-1 mb-1">1. Selecciona tu Iglesia / Sede (*)</label>
                    <select id="reg-sede" class="form-select form-select-custom" onchange="limpiarBuscador()">
                        <option value="" disabled selected>Cargando sedes...</option>
                    </select>
                </div>

                <div class="mb-3 position-relative">
                    <label class="form-label small fw-bold text-muted ms-1 mb-1">2. Tu Nombre Completo (*)</label>
                    <input type="text" id="reg-nombre" class="form-control form-control-custom border-primary" placeholder="Ej: Juan Pérez" autocomplete="off" onkeyup="buscarNombrePredictivo(this.value)">
                    <input type="hidden" id="reg-persona-id" value="">
                    <input type="hidden" id="reg-organizacion-id" value="">
                    
                    <div id="reg-resultados-nombre" class="list-group position-absolute w-100 shadow-lg mt-1" style="display: none; max-height: 200px; overflow-y: auto; z-index: 1000;"></div>
                    
                    <div id="reg-hint-vinculo" class="form-text small text-success fw-bold d-none mt-1"><i class="fa-solid fa-link"></i> ¡Perfil vinculado listo para activar!</div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted ms-1 mb-1">3. Tu Correo Electrónico (*)</label>
                    <input type="email" id="reg-email" class="form-control form-control-custom" placeholder="tu@correo.com">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted ms-1 mb-1">4. Crea una Contraseña (*)</label>
                    <input type="password" id="reg-pass" class="form-control form-control-custom" placeholder="Mínimo 6 caracteres">
                </div>
                
                <button id="btn-reg" class="btn btn-brand btn-accent w-100 mb-3" onclick="ejecutarRegistro()">
                    <span class="btn-text">Activar mi Cuenta</span>
                    <i class="fa-solid fa-circle-notch fa-spin vinculo-loader ms-2"></i>
                </button>
                
                <div class="text-center mt-3 mb-4 border-top pt-3">
                    <button class="btn btn-link text-muted fw-bold text-decoration-none small" onclick="alternarVistas()">
                        <i class="fa-solid fa-arrow-left me-1"></i> Volver a Iniciar Sesión
                    </button>
                </div>
            </div>

        </div>
        
        <div class="text-center py-4 mt-auto">
             <small class="text-muted opacity-75" style="font-size: 0.7rem;">Desarrollado por <b>VínculoApp</b></small>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://molqmoxdnddsrljuoljv.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vbHFtb3hkbmRkc3JsanVvbGp2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDQ5NzIzMSwiZXhwIjoyMDkwMDczMjMxfQ.1Is7Jz6dM7BXSXSeZppXf0_uq4bbKiNsCwlKzuL5YNw';
        const clienteSupa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', () => {
            cargarSedes();
        });

        // ==========================================
        // CARGAR SEDES PARA EL REGISTRO
        // ==========================================
        async function cargarSedes() {
            try {
                // Pedimos solo el nombre de la sede para evitar errores de columnas faltantes
                const { data, error } = await clienteSupa.from('sedes').select('nombre');
                const select = document.getElementById('reg-sede');
                
                if (data && data.length > 0) {
                    select.innerHTML = '<option value="" disabled selected>Selecciona tu iglesia...</option>' + 
                        data.map(s => `<option value="${s.nombre}">${s.nombre}</option>`).join('');
                } else {
                    select.innerHTML = '<option value="" disabled selected>No se encontraron iglesias</option>';
                }
            } catch (e) { console.error(e); }
        }

        // ==========================================
        // BUSCADOR PREDICTIVO (CORREGIDO - ANTI ERROR 400)
        // ==========================================
        async function buscarNombrePredictivo(val) {
            const resultsDiv = document.getElementById('reg-resultados-nombre');
            const sedeSelect = document.getElementById('reg-sede');
            const sedeNombre = sedeSelect.value;
            
            if (!val || val.length < 3) {
                resultsDiv.style.display = 'none';
                resetearVinculo();
                return;
            }

            if (!sedeNombre) {
                resultsDiv.innerHTML = '<div class="list-group-item text-danger small"><i class="fa-solid fa-triangle-exclamation me-1"></i> Por favor, selecciona tu iglesia primero.</div>';
                resultsDiv.style.display = 'block';
                return;
            }

            // FIX: Pedimos solo 'id' y 'nombre' para evitar el error 400 de columnas que no coinciden (como correo vs email)
            const { data, error } = await clienteSupa
                .from('personas')
                .select('id, nombre') 
                .eq('sede_nombre', sedeNombre)
                .is('auth_id', null)
                .ilike('nombre', `%${val}%`)
                .limit(5);

            if (error) {
                console.error("Error en la búsqueda:", error);
                return;
            }

            if (data && data.length > 0) {
                resultsDiv.innerHTML = data.map(p => `
                    <button type="button" class="list-group-item list-group-item-action py-2 small border-primary border-opacity-25" 
                        onclick="seleccionarPersonaParaRegistro('${p.id}', '${p.nombre.replace(/'/g, "\\'")}')">
                        <i class="fa-solid fa-user-check text-success me-2"></i> <strong>${p.nombre}</strong>
                    </button>
                `).join('');
            } else {
                resultsDiv.innerHTML = '<div class="list-group-item text-muted small"><i class="fa-solid fa-plus-circle me-1"></i> Eres nuevo. Se creará tu registro oficial.</div>';
            }
            resultsDiv.style.display = 'block';
        }

        function seleccionarPersonaParaRegistro(id, nombre) {
            document.getElementById('reg-nombre').value = nombre;
            document.getElementById('reg-persona-id').value = id;
            
            document.getElementById('reg-resultados-nombre').style.display = 'none';
            
            document.getElementById('reg-hint-vinculo').classList.remove('d-none');
            document.getElementById('reg-nombre').classList.replace('border-primary', 'border-success');
            document.getElementById('reg-sede').disabled = true; 
        }

        function resetearVinculo() {
            document.getElementById('reg-persona-id').value = '';
            document.getElementById('reg-hint-vinculo').classList.add('d-none');
            document.getElementById('reg-nombre').classList.replace('border-success', 'border-primary');
            document.getElementById('reg-sede').disabled = false;
        }

        function limpiarBuscador() {
            document.getElementById('reg-nombre').value = '';
            resetearVinculo();
            document.getElementById('reg-resultados-nombre').style.display = 'none';
        }

        function alternarVistas() {
            const vLogin = document.getElementById('vista-login');
            const vRegistro = document.getElementById('vista-registro');
            document.getElementById('login-error').classList.add('d-none');
            document.getElementById('reg-error').classList.add('d-none');
            
            if (vLogin.classList.contains('d-none')) {
                vRegistro.classList.add('d-none');
                vLogin.classList.remove('d-none');
                vLogin.classList.add('animate__fadeInLeft');
            } else {
                vLogin.classList.add('d-none');
                vRegistro.classList.remove('d-none');
            }
        }

        // ==========================================
        // INICIAR SESIÓN
        // ==========================================
        async function ejecutarLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            const errorBox = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');

            if (!email || !pass) {
                mostrarError(errorBox, "Por favor completa todos los campos.");
                return;
            }

            estadoCarga(btn, true);
            const { data, error } = await clienteSupa.auth.signInWithPassword({ email, password: pass });
            estadoCarga(btn, false);

            if (error) {
                mostrarError(errorBox, "Correo o contraseña incorrectos.");
            } else {
                window.location.href = "app_inicio.html"; 
            }
        }

        // ==========================================
        // EJECUTAR REGISTRO (VERSIÓN MEJORADA)
        // ==========================================
        async function ejecutarRegistro() {
            const sedeSelect = document.getElementById('reg-sede');
            const sedeNombre = sedeSelect.value;
            
            const nombre = document.getElementById('reg-nombre').value.trim();
            const email = document.getElementById('reg-email').value.trim().toLowerCase();
            const pass = document.getElementById('reg-pass').value;
            
            const personaVinculadaId = document.getElementById('reg-persona-id').value;

            const errorBox = document.getElementById('reg-error');
            const btn = document.getElementById('btn-reg');

            if (!sedeNombre) return mostrarError(errorBox, "Debes seleccionar tu iglesia.");
            if (!nombre || !email || !pass) return mostrarError(errorBox, "Nombre, Correo y Contraseña son obligatorios.");
            if (pass.length < 6) return mostrarError(errorBox, "La contraseña debe tener al menos 6 caracteres.");

            estadoCarga(btn, true);

            // A: Crear la cuenta en Supabase Auth y guardar el nombre en los metadatos
            const { data: authData, error: authError } = await clienteSupa.auth.signUp({
                email: email,
                password: pass,
                options: {
                    data: {
                        nombre: nombre // <-- AQUÍ ENVIAMOS EL NOMBRE A SUPABASE AUTH
                    }
                }
            });

            if (authError) {
                estadoCarga(btn, false);
                mostrarError(errorBox, authError.message.includes('already registered') ? "Este correo ya está registrado. Inicia sesión." : "Hubo un error al crear tu cuenta.");
                return;
            }

            const userID = authData.user.id;

            // B: Lógica Inteligente: Vincular o Crear Perfil
            if (personaVinculadaId) {
                // Si encontró su nombre, actualizamos su ficha existente con el nuevo auth_id y su correo
                await clienteSupa.from('personas').update({ 
                    auth_id: userID,
                    email: email 
                }).eq('id', personaVinculadaId);
            } else {
                // Si es alguien 100% nuevo, creamos su ficha desde cero
                await clienteSupa.from('personas').insert([{
                    nombre: nombre,
                    email: email,
                    auth_id: userID,
                    sede_nombre: sedeNombre,
                    estado: 'Activo',
                    etapa_crecimiento: 'Nuevo Hijo'
                }]);
            }

            estadoCarga(btn, false);
            // Registro exitoso, lo enviamos al panel de inicio
            window.location.href = "app_inicio.html"; 
        }

        // ==========================================
        // FUNCIONES VISUALES
        // ==========================================
        function mostrarError(elemento, mensaje) {
            elemento.innerText = mensaje;
            elemento.classList.remove('d-none');
            elemento.classList.add('animate__animated', 'animate__headShake');
            setTimeout(() => elemento.classList.remove('animate__headShake'), 1000);
        }

        function estadoCarga(btn, cargando) {
            const icon = btn.querySelector('.vinculo-loader');
            const text = btn.querySelector('.btn-text');
            if (cargando) {
                icon.classList.add('active');
                text.style.opacity = '0.5';
                btn.disabled = true;
            } else {
                icon.classList.remove('active');
                text.style.opacity = '1';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
