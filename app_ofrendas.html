<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f8fafc">
    <title>Generosidad - VínculoApp</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --brand-primary: #002B5B;
            --brand-warning: #f59e0b; 
        }
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .mobile-container {
            max-width: 480px; margin: 0 auto; background: #f8fafc; min-height: 100vh;
            box-shadow: 0 0 50px rgba(0,0,0,0.05); position: relative;
        }
        
        .top-nav {
            background: #ffffff; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .btn-back {
            background: #f1f5f9; color: #334155; border: none;
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: all 0.2s;
        }

        .input-custom {
            border: 2px solid #e2e8f0; border-radius: 15px; padding: 15px;
            font-size: 1.8rem; font-weight: 800; color: #1e293b; text-align: center;
            background: #ffffff; width: 100%; transition: 0.2s;
        }
        .input-custom:focus { border-color: var(--brand-warning); outline: none; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.05); }
        
        .card-pro { background: #ffffff; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: none; overflow: hidden; }
        
        .bank-details {
            background-color: #f1f5f9; border-left: 4px solid #3b82f6;
            border-radius: 12px; padding: 18px; font-size: 0.9rem; display: none;
        }
        .history-item { border-bottom: 1px solid #f1f5f9; }
        .history-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div class="mobile-container pb-5">
        <div class="top-nav">
            <a href="app_inicio.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
            <h5 class="m-0 fw-bold text-dark" style="font-size: 1.1rem;">Generosidad</h5>
            <div style="width: 40px;"></div> 
        </div>

        <div class="p-4 text-center animate__animated animate__fadeIn">
            <div class="bg-warning bg-opacity-10 d-inline-flex p-3 rounded-circle mb-3">
                <i class="fa-solid fa-hand-holding-heart fa-2x text-warning"></i>
            </div>
            <h4 class="fw-bold text-dark mb-2">Apoya la visión</h4>
            <p class="text-muted small mx-auto" style="max-width: 300px; font-style: italic;">
                "Cada uno dé como propuso en su corazón: no con tristeza, ni por necesidad, porque Dios ama al dador alegre."
            </p>
        </div>

        <div class="px-4">
            <div class="card-pro p-4 mb-4 shadow-sm border-0 animate__animated animate__fadeInUp">
                <h6 class="fw-bold text-muted small text-uppercase mb-3 text-center">Monto de tu aporte</h6>
                
                <div class="position-relative mb-4">
                    <span class="position-absolute text-muted fw-bold" style="left: 20px; top: 18px; font-size: 1.5rem;">$</span>
                    <input type="number" id="monto-input" class="input-custom ps-5" placeholder="0">
                </div>

                <div class="form-floating mb-3">
                    <select class="form-select border-2" id="concepto-input" style="border-radius: 12px; font-weight: 600;">
                        <option value="Diezmos">Diezmos</option>
                        <option value="Ofrendas" selected>Ofrendas</option>
                    </select>
                    <label class="fw-bold text-muted">Concepto</label>
                </div>

                <div class="form-floating mb-4">
                    <select class="form-select border-2" id="metodo-input" style="border-radius: 12px; font-weight: 600;" onchange="alternarMetodo()">
                        <option value="flow" selected>Pago Online (Flow)</option>
                        <option value="transferencia">Transferencia Bancaria</option>
                    </select>
                    <label class="fw-bold text-muted">Método de Pago</label>
                </div>

                <div id="datos-bancarios" class="bank-details mb-4 animate__animated animate__fadeIn">
                    <div id="contenido-bancario">
                        <i class="fa-solid fa-circle-notch fa-spin me-2"></i> Cargando datos de tu sede...
                    </div>
                </div>

                <button id="btn-pagar" class="btn btn-warning w-100 rounded-pill py-3 fw-bold text-dark shadow-sm" style="font-size: 1.1rem;" onclick="procesarAporte()">
                    <i class="fa-solid fa-lock me-2"></i> Donar con Flow
                </button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3 px-1">
                <h6 class="fw-bold text-dark m-0">Mis aportes recientes</h6>
                <i class="fa-solid fa-clock-rotate-left text-muted"></i>
            </div>
            
            <div id="historial-aportes" class="card-pro shadow-sm"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://molqmoxdnddsrljuoljv.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vbHFtb3hkbmRkc3JsanVvbGp2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDQ5NzIzMSwiZXhwIjoyMDkwMDczMjMxfQ.1Is7Jz6dM7BXSXSeZppXf0_uq4bbKiNsCwlKzuL5YNw';
        const clienteSupa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const URL_WORKER_FLOW = 'https://robot-pagos-flow.ageyssel-llanos.workers.dev';
        
        let sesionUsuario = null;
        let datosSedeActual = null;
        let perfilUsuario = null; // Guardamos el perfil para saber su nombre y enviarlo a finance.js

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await clienteSupa.auth.getSession();
            if (!session) { window.location.href = 'miembros.html'; return; }
            sesionUsuario = session.user;
            
            await cargarDatosSede();
            cargarHistorial();
        });

        async function cargarDatosSede() {
            try {
                // Buscamos a la persona y los datos de su sede
                const { data: persona, error } = await clienteSupa
                    .from('personas')
                    .select('*, sedes(*)')
                    .eq('auth_id', sesionUsuario.id)
                    .single();

                if (persona) {
                    perfilUsuario = persona;
                    datosSedeActual = persona.sedes;
                    
                    if (datosSedeActual) {
                        document.getElementById('contenido-bancario').innerHTML = `
                            <strong class="text-primary text-uppercase small d-block mb-2">Datos para transferir a ${datosSedeActual.nombre}:</strong>
                            <div class="mb-1">Banco: <b>${datosSedeActual.banco || 'No definido'}</b></div>
                            <div class="mb-1">Tipo: <b>${datosSedeActual.tipo_cuenta || 'No definido'}</b></div>
                            <div class="mb-1">Cuenta: <b>${datosSedeActual.numero_cuenta || 'No definida'}</b></div>
                            <div class="mb-1">RUT: <b>${datosSedeActual.rut || 'No definido'}</b></div>
                            <div class="mb-1">Nombre: <b>${datosSedeActual.nombre_cuenta || 'No definido'}</b></div>
                            <div class="mb-0">Correo: <b>${datosSedeActual.correo_transferencia || 'No definido'}</b></div>
                        `;
                    } else {
                        document.getElementById('contenido-bancario').innerHTML = "No se encontraron datos bancarios para tu sede.";
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        function alternarMetodo() {
            const metodo = document.getElementById('metodo-input').value;
            const btn = document.getElementById('btn-pagar');
            const boxDatos = document.getElementById('datos-bancarios');

            if (metodo === 'transferencia') {
                boxDatos.style.display = 'block';
                btn.classList.replace('btn-warning', 'btn-primary');
                btn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> Notificar Transferencia';
                btn.style.color = 'white';
            } else {
                boxDatos.style.display = 'none';
                btn.classList.replace('btn-primary', 'btn-warning');
                btn.innerHTML = '<i class="fa-solid fa-lock me-2"></i> Donar con Flow';
                btn.style.color = '#212529';
            }
        }

        async function procesarAporte() {
            const monto = parseInt(document.getElementById('monto-input').value);
            const concepto = document.getElementById('concepto-input').value;
            const metodo = document.getElementById('metodo-input').value;
            const btn = document.getElementById('btn-pagar');

            if (isNaN(monto) || monto < 1000) {
                return Swal.fire('Aviso', 'Ingresa un monto mínimo de $1.000', 'warning');
            }

            btn.disabled = true;
            const textOrig = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i> Procesando...';

            try {
                // Adaptamos los nombres a la tabla 'aportes' de finance.js
                const estadoRegistro = metodo === 'flow' ? 'Pendiente' : 'Transferencia Pendiente';
                const aportanteNombre = perfilUsuario ? (perfilUsuario.nombres || perfilUsuario.nombre) : 'Usuario App';
                const sedeNombre = datosSedeActual ? datosSedeActual.nombre : 'Sede Central';
                // La fecha la genera Supabase automáticamente por defecto, o usamos el ISO actual
                const fechaActual = new Date().toISOString(); 

                const objetoAporte = {
                    fecha: fechaActual,
                    auth_id: sesionUsuario.id,
                    aportante: aportanteNombre,
                    tipo_aporte: concepto,
                    monto: monto,
                    sede_nombre: sedeNombre,
                    estado: estadoRegistro,
                    comentarios: 'Enviado desde VínculoApp Miembros'
                };

                // Guardamos en la tabla de la app madre
                const { data: aporteDB, error: errDB } = await clienteSupa.from('aportes').insert([objetoAporte]).select();

                if (errDB) {
                    console.error("Error BD:", errDB);
                    throw new Error("Error al registrar en BD");
                }

                if (metodo === 'flow') {
                    const res = await fetch(URL_WORKER_FLOW, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            monto: monto, 
                            email: sesionUsuario.email, 
                            concepto: concepto, 
                            orden_id: aporteDB[0].id 
                        })
                    });
                    const flow = await res.json();
                    if (flow.url_redireccion) {
                        window.location.href = flow.url_redireccion;
                    } else {
                        throw new Error('Flow devolvió un error.');
                    }
                } else {
                    Swal.fire('¡Aviso Enviado!', 'Tu registro ha sido guardado. Por favor, realiza la transferencia con los datos indicados para que nuestro equipo lo confirme.', 'success')
                    .then(() => { location.reload(); });
                }
            } catch (e) {
                Swal.fire('Error', 'No se pudo procesar. Revisa tu conexión.', 'error');
                btn.disabled = false; btn.innerHTML = textOrig;
            }
        }

        async function cargarHistorial() {
            // Buscamos en 'aportes' filtrando por auth_id
            const { data, error } = await clienteSupa
                .from('aportes')
                .select('*')
                .eq('auth_id', sesionUsuario.id)
                .order('fecha', {ascending: false})
                .limit(5);

            const cont = document.getElementById('historial-aportes');
            
            if (error || !data || data.length === 0) {
                cont.innerHTML = '<div class="text-center py-4 text-muted small">Sin registros aún.</div>';
                return;
            }
            
            cont.innerHTML = data.map(i => {
                let colorStatus = 'text-muted';
                if(i.estado === 'Completado') colorStatus = 'text-success';
                if(i.estado === 'Transferencia Pendiente') colorStatus = 'text-primary';
                
                return `
                <div class="history-item p-3 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <div class="bg-light p-2 rounded-circle me-3 ${colorStatus} bg-opacity-10">
                            <i class="fa-solid fa-receipt"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-bold small text-dark">${i.tipo_aporte}</h6>
                            <small class="text-muted">${new Date(i.fecha).toLocaleDateString('es-CL')} • <span class="${colorStatus} fw-bold" style="font-size: 0.75rem;">${i.estado || 'Procesado'}</span></small>
                        </div>
                    </div>
                    <h6 class="mb-0 fw-bold text-dark">$${i.monto.toLocaleString('es-CL')}</h6>
                </div>`
            }).join('');
        }
    </script>
</body>
</html>
